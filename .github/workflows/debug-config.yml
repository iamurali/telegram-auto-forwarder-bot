name: Debug Config (one-time)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/debug-config.yml'

jobs:
  print-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Print config as base64
        env:
          SOURCE_CHAT_ID: ${{ secrets.SOURCE_CHAT_ID }}
          RECIPIENT_IDS: ${{ secrets.RECIPIENT_IDS }}
          ROUTES_JSON: ${{ secrets.ROUTES_JSON }}
        run: python scripts/print_config.py
