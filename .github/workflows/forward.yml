name: Forward Telegram Messages

on:
  # schedule:
    # Every minute. For active channels, consider */5 or */15 (see README).
    # - cron: '* * * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/forward.yml'
      - 'forward.py'
  workflow_dispatch:
  repository_dispatch:  # Add this - allows external trigger
    types: [telegram-forward]

jobs:
  forward:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
        
    - name: Forward messages
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
        ROUTES_JSON: ${{ secrets.ROUTES_JSON }}
      run: python forward.py
      
    - name: Commit state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add state.enc
        git add -u .
        git diff --quiet && git diff --staged --quiet || git commit -m "Update state"
        git pull --rebase origin main
        git push
