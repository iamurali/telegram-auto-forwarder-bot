name: Forward Telegram Messages

on:
  # schedule:
    # Every minute. For active channels, consider */5 or */15 (see README).
    # - cron: '* * * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/forward.yml'
      - 'forward.py'
  workflow_dispatch:
  repository_dispatch:  # Add this - allows external trigger
    types: [telegram-forward]

jobs:
  forward:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Restore state cache
      uses: actions/cache/restore@v4
      id: state-cache
      with:
        path: state.enc
        key: telegram-forwarder-state-${{ hashFiles('state.enc') }}
        restore-keys: |
          telegram-forwarder-state-

    - name: Forward messages
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
        ROUTES_JSON: ${{ secrets.ROUTES_JSON }}
      run: python forward.py

    - name: Save state cache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: state.enc
        key: telegram-forwarder-state-${{ hashFiles('state.enc') }}
